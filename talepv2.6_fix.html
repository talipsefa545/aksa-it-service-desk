<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AKSA IT Service Desk - V2.3</title>
<style>
  :root{
    /* Admin theme (solid readable) */
    --a-bg1:#0b1630;
    --a-bg2:#061027;
    --a-panel:#0e1f44;
    --a-text:#eaf1ff;
    --a-muted:#a9b6d5;
    --a-line:rgba(255,255,255,.10);
    --a-brand:#2f7bff;
    --a-brand2:#1d56c7;
    --a-shadow:0 14px 40px rgba(0,0,0,.35);
    --radius2:18px;

    /* Public theme */
    --p-card:#ffffff;
    --p-text:#0f172a;
    --p-muted:#475569;
    --p-line:#e5e7eb;
    --p-input:#f8fafc;

    /* SLA thresholds (hours) */
    --sla-warn:4;
    --sla-bad:8;
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:"Segoe UI",system-ui,-apple-system,Arial,sans-serif;
    background: radial-gradient(1200px 600px at 10% 0%, #122a55 0%, transparent 60%),
                radial-gradient(900px 500px at 90% 20%, #0e2f6a 0%, transparent 55%),
                linear-gradient(135deg,var(--a-bg1),var(--a-bg2));
    min-height:100vh;
  }

  /* Topbar */
  .topbar{
    position:sticky; top:0; z-index:50;
    background: rgba(6,16,39,.92);
    border-bottom:1px solid var(--a-line);
    padding:14px 18px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .brand{ display:flex; align-items:center; gap:12px; color:var(--a-text); }
  .logo{
    width:38px; height:38px;
    border-radius:12px;
    background: linear-gradient(135deg,var(--a-brand),#69a7ff);
    box-shadow: 0 10px 30px rgba(47,123,255,.35);
    display:grid; place-items:center;
    font-weight:900;
    color:#fff;
  }
  .titleblock .t1{ font-weight:900; letter-spacing:.2px; }
  .titleblock .t2{ font-size:12px; color:var(--a-muted); margin-top:2px; }
  .actions{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .btn{
    border:1px solid var(--a-line);
    background: rgba(255,255,255,.06);
    color:var(--a-text);
    padding:10px 12px;
    border-radius:12px;
    cursor:pointer;
    display:inline-flex; align-items:center; gap:8px;
    transition:.15s ease;
    user-select:none;
  }
  .btn:hover{ transform:translateY(-1px); background: rgba(255,255,255,.09); }
  .btn.primary{
    background: linear-gradient(135deg,var(--a-brand),var(--a-brand2));
    border-color: transparent;
  }
  .chip{
    padding:8px 10px;
    border-radius:999px;
    border:1px solid var(--a-line);
    background: rgba(255,255,255,.06);
    font-size:12px;
    color:var(--a-muted);
  }

  .wrap{ max-width:1200px; margin:18px auto 60px; padding:0 18px; }
  .grid{ display:grid; grid-template-columns: 1.05fr .95fr; gap:16px; }
  @media (max-width:980px){ .grid{ grid-template-columns:1fr; } }

  /* Public cards */
  .cardPublic{
    background: var(--p-card);
    border:1px solid var(--p-line);
    border-radius: var(--radius2);
    box-shadow: 0 10px 30px rgba(0,0,0,.18);
    overflow:hidden;
    color: var(--p-text);
  }
  .cardPublic .cardhead{
    padding:16px 16px 10px;
    border-bottom:1px solid var(--p-line);
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:#fff;
  }
  .cardPublic .cardhead h2{ margin:0; font-size:15px; }
  .cardPublic .cardbody{ padding:16px; }
  .cardPublic label{ display:block; font-size:12px; color:var(--p-muted); margin-bottom:6px; }
  .cardPublic input, .cardPublic select, .cardPublic textarea{
    width:100%;
    padding:11px 12px;
    border-radius:12px;
    border:1px solid var(--p-line);
    background: var(--p-input);
    color: var(--p-text);
    outline:none;
  }
  .cardPublic textarea{ min-height:110px; resize:vertical; }
  .cardPublic .hint{ font-size:12px; color:var(--p-muted); margin-top:10px; }
  .cardPublic .refbox{
    margin-top:12px;
    padding:12px;
    border:1px dashed #cbd5e1;
    border-radius:14px;
    background:#f8fafc;
    color: var(--p-text);
  }
  .fieldrow{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  @media (max-width:520px){ .fieldrow{ grid-template-columns:1fr; } }

  /* Admin cards */
  .adminShell{ display:none; }
  .cardAdmin{
    background: var(--a-panel);
    border:1px solid var(--a-line);
    border-radius: var(--radius2);
    box-shadow: var(--a-shadow);
    overflow:hidden;
    color: var(--a-text);
  }
  .cardAdmin .cardhead{
    padding:16px 16px 10px;
    border-bottom:1px solid var(--a-line);
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:#0a1734;
  }
  .cardAdmin .cardhead h2{ margin:0; font-size:15px; }
  .cardAdmin .cardbody{ padding:16px; }
  .cardAdmin label{ display:block; font-size:12px; color:var(--a-muted); margin-bottom:6px; }
  .cardAdmin input, .cardAdmin select, .cardAdmin textarea{
    width:100%;
    padding:11px 12px;
    border-radius:12px;
    border:1px solid var(--a-line);
    background: rgba(0,0,0,.18);
    color: var(--a-text);
    outline:none;
  }

  /* KPI */
  .kpis{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:10px;
    padding:14px 14px 0;
  }
  @media (max-width:900px){ .kpis{ grid-template-columns: repeat(2,1fr); } }
  .kpi{
    border:1px solid var(--a-line);
    background:#0a1734;
    border-radius:16px;
    padding:12px;
    cursor:pointer;
    user-select:none;
    transition:.15s ease;
  }
  .kpi:hover{ transform: translateY(-1px); filter:brightness(1.05); }
  .kpi.active{ outline:3px solid rgba(47,123,255,.55); }
  .kpi .n{ font-size:22px; font-weight:900; }
  .kpi .l{ font-size:12px; color:var(--a-muted); margin-top:6px; }

  .toolbar{
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
    padding: 14px;
    border-top:1px solid var(--a-line);
    border-bottom:1px solid var(--a-line);
    background:#091530;
  }
  .toolbar .grow{ flex:1; min-width:220px; }
  .toolbar select{ max-width:220px; }

  /* Table */
  .tablewrap{ overflow:auto; }
  table{
    width:100%;
    border-collapse:collapse;
    min-width: 980px;
  }
  th, td{
    padding:12px 12px;
    border-bottom:1px solid var(--a-line);
    text-align:left;
    font-size:13px;
    vertical-align:top;
    color: var(--a-text);
  }
  th{
    color:var(--a-muted);
    font-weight:800;
    position:sticky; top:0;
    background:#07122a;
  }
  tr:hover td{ background: rgba(255,255,255,.03); }
  #adminTbody tr{ cursor:pointer; }
  .rowbtn{
    padding:8px 10px;
    border-radius:12px;
    border:1px solid var(--a-line);
    background: rgba(255,255,255,.06);
    cursor:pointer;
    color:var(--a-text);
    white-space:nowrap;
  }

  /* badges */
  .badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    padding:6px 10px;
    border-radius:999px;
    font-size:12px;
    border:1px solid var(--a-line);
    background: rgba(255,255,255,.06);
    white-space:nowrap;
  }
  .b-wait{ border-color: rgba(245,158,11,.45); background: rgba(245,158,11,.12); }
  .b-prog{ border-color: rgba(47,123,255,.45); background: rgba(47,123,255,.12); }
  .b-done{ border-color: rgba(22,163,74,.45); background: rgba(22,163,74,.12); }

  .p-low{ border-color: rgba(22,163,74,.45); background: rgba(22,163,74,.12); }
  .p-med{ border-color: rgba(245,158,11,.45); background: rgba(245,158,11,.12); }
  .p-high{ border-color: rgba(239,68,68,.55); background: rgba(239,68,68,.14); }

  /* Modal */
  .modalBack{
    position:fixed; inset:0;
    background: rgba(0,0,0,.60);
    display:none;
    align-items:center;
    justify-content:center;
    padding:18px;
    z-index:90;
  }
  .modal{
    width:min(860px, 100%);
    border-radius:18px;
    border:1px solid var(--a-line);
    background:#0b1a38;
    box-shadow: var(--a-shadow);
    overflow:hidden;
    color: var(--a-text);
  }
  .modalHead{
    padding:14px 16px;
    border-bottom:1px solid var(--a-line);
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:#07122a;
  }
  .modalHead .mh{ font-weight:900; }
  .modalBody{ padding:16px; }
  .modalGrid{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:12px;
  }
  @media (max-width:820px){ .modalGrid{ grid-template-columns:1fr; } }
  .kv{
    padding:12px;
    border:1px solid var(--a-line);
    border-radius:16px;
    background: rgba(0,0,0,.20);
  }
  .kv .k{ font-size:12px; color:var(--a-muted); }
  .kv .v{ margin-top:6px; font-weight:800; }
  .modalActions{
    display:flex; gap:10px; justify-content:flex-end; flex-wrap:wrap;
    padding:14px 16px;
    border-top:1px solid var(--a-line);
    background:#07122a;
  }
  .sep{ height:1px; background: var(--a-line); margin:12px 0; }

  .slaBox{
    padding:11px 12px;
    border:1px solid var(--a-line);
    border-radius:12px;
    background: rgba(255,255,255,.06);
    font-weight:900;
  }
  .slaWarn{ border-color: rgba(245,158,11,.75); background: rgba(245,158,11,.14); }
  .slaBad{ border-color: rgba(239,68,68,.85); background: rgba(239,68,68,.16); }

  /* Toast */
  .toast{
    position: fixed;
    right: 18px;
    bottom: 18px;
    background: rgba(0,0,0,.70);
    border:1px solid var(--a-line);
    color: var(--a-text);
    padding: 12px 14px;
    border-radius: 14px;
    display:none;
    box-shadow: var(--a-shadow);
    max-width: 420px;
    z-index: 120;
  }
  .toast .t1{ font-weight:900; }
  .toast .t2{ font-size:12px; color: var(--a-muted); margin-top:4px; }

  /* Admin login stacked (altlı üstlü) */
  .stack{ display:flex; flex-direction:column; gap:12px; max-width:420px; }
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">
    <div class="logo">IT</div>
    <div class="titleblock">
      <div class="t1">AKSA Doğalgaz Balıkesir — IT Service Desk</div>
      <div class="t2"></div>
    </div>
  </div>
  <div class="actions">
    <span class="chip" id="envChip">Public</span>
    <button class="btn" id="btnPublic" type="button">Yeni Talep</button>
    <button class="btn primary" id="btnAdmin" type="button">Admin</button>
  </div>
</div>

<div class="wrap">

  <!-- PUBLIC -->
  <div id="publicShell">
    <div class="grid">

      <div class="cardPublic">
        <div class="cardhead">
          <h2>Yeni Talep Oluştur</h2>
        </div>
        <div class="cardbody">
          <form id="ticketForm">
            <div class="fieldrow">
              <div>
                <label>Ad Soyad</label>
                <input id="fullNameInput" placeholder="Örn: Ahmet Yılmaz" required />
              </div>
              <div>
                <label>Sicil No</label>
                <input id="sicilNoInput" placeholder="Örn: 12345" required inputmode="numeric" />
              </div>
            </div>

            <div class="fieldrow">
              <div>
                <label>Departman</label>
                <select id="departmentSelect" required>
                  <option value="">Seçiniz</option>
                  <option>Muhasebe</option>
                  <option>Müşteri Hizmetleri</option>
                  <option>RMS</option>
                  <option>İşletme</option>
                  <option>Ölçüm Tahakkuk</option>
                  <option>Depo</option>
                  <option>Bakım</option>
                  <option>Yatırım</option>
                  <option>Yönetim</option>
                </select>
              </div>
              <div>
                <label>Öncelik</label>
                <select id="prioritySelect">
                  <option value="low">Düşük</option>
                  <option value="medium">Orta</option>
                  <option value="high">Yüksek</option>
                </select>
              </div>
            </div>

            <div>
              <label>Sorun Açıklaması</label>
              <textarea id="issueText" placeholder="Kısa ve net açıklama yazın..."></textarea>
            </div>

            <button class="btn primary" type="submit">Talep Gönder</button>
                      </form>

          <div class="refbox" id="refBox" style="display:none;"></div>
        </div>
      </div>

      <div class="cardPublic">
        <div class="cardhead">
          <h2>Talep Arama</h2>
        </div>
        <div class="cardbody">
          <label>Referans No</label>
          <input id="trackRefInput" placeholder="Örn: AKSA-IT-2026-0001" />

          <label>Sicil No</label>
          <input id="trackSicilInput" placeholder="Örn: 12345 (Enter bas)" inputmode="numeric" />

          <button class="btn" type="button" id="btnTrack" style="border-color:#e5e7eb;color:#0f172a;background:#fff;">Sorgula</button>
         
          <div style="height:1px;background:#e5e7eb;margin:12px 0;"></div>
          <div id="trackResult"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- ADMIN -->
  <div id="adminShell" class="adminShell">
    <div class="cardAdmin">
      <div class="cardhead">
        <h2>Admin Giriş</h2>
        
      </div>
      <div class="cardbody">
        <div class="stack">
          <div>
            <label>Kullanıcı</label>
            <input id="adminUserInput" placeholder="Kullanıcı" />
          </div>
          <div>
            <label>Şifre</label>
            <input id="adminPassInput" type="password" placeholder="Şifre" />
          </div>
          <button class="btn primary" type="button" id="btnLogin">Giriş</button>
        </div>
      </div>
    </div>

    <div class="cardAdmin" id="dashboard" style="display:none;margin-top:14px;">
      <div class="cardhead">
        <h2>Dashboard</h2>
        <div class="actions">
          <button class="btn" type="button" id="btnExport">CSV İndir</button>
          <button class="btn" type="button" id="btnClearSearch">Aramayı Temizle</button>
        </div>
      </div>

      <div class="kpis">
        <div class="kpi" id="kWait" data-filter="waiting"><div class="n" id="kWaitN">0</div><div class="l">Bekleyen</div></div>
        <div class="kpi" id="kProg" data-filter="progress"><div class="n" id="kProgN">0</div><div class="l">İşlemde</div></div>
        <div class="kpi" id="kDone" data-filter="done"><div class="n" id="kDoneN">0</div><div class="l">Tamamlanan</div></div>
        <div class="kpi" id="kAll" data-filter="all"><div class="n" id="kAllN">0</div><div class="l">Toplam</div></div>
      </div>

      <div class="toolbar">
        <input class="grow" id="adminSearchInput" placeholder="Ara... (ref, ad, sicil, departman, açıklama)" />
        <select id="statusFilter">
          <option value="all">Durum: Hepsi</option>
          <option value="waiting">Durum: Bekleyen</option>
          <option value="progress">Durum: İşlemde</option>
          <option value="done">Durum: Tamamlandı</option>
        </select>
        <select id="priorityFilter">
          <option value="all">Öncelik: Hepsi</option>
          <option value="low">Öncelik: Düşük</option>
          <option value="medium">Öncelik: Orta</option>
          <option value="high">Öncelik: Yüksek</option>
        </select>
      </div>

      <div class="tablewrap">
        <table>
          <thead>
            <tr>
              <th style="width:160px">Referans</th>
              <th style="width:160px">Talep Açan</th>
              <th style="width:110px">Sicil</th>
              <th style="width:150px">Departman</th>
              <th>Özet</th>
              <th style="width:130px">Durum</th>
              <th style="width:130px">Öncelik</th>
              <th style="width:170px">Tarih</th>
              <th style="width:120px"></th>
            </tr>
          </thead>
          <tbody id="adminTbody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modalBack" id="modalBack">
  <div class="modal">
    <div class="modalHead">
      <div class="mh" id="modalTitle">Ticket</div>
      <button class="btn" type="button" id="btnModalClose">Kapat</button>
    </div>
    <div class="modalBody">
      <div class="modalGrid" id="modalGrid"></div>

      <div class="sep"></div>

      <div class="fieldrow">
        <div>
          <label>Durum</label>
          <select id="modalStatus">
            <option value="waiting">Bekleyen</option>
            <option value="progress">İşlemde</option>
            <option value="done">Tamamlandı</option>
          </select>
        </div>
        <div>
          <label>Öncelik</label>
          <select id="modalPriority">
            <option value="low">Düşük</option>
            <option value="medium">Orta</option>
            <option value="high">Yüksek</option>
          </select>
        </div>
      </div>

      <label>SLA</label>
      <div id="modalSlaBox" class="slaBox">-</div>
      <div style="color:var(--a-muted);font-size:12px;margin-top:6px;">
        Uyarı: ≥4 sa • Kritik: ≥8 sa (Tamamlandı ise izleme durur)
      </div>

      <div class="sep"></div>

      <label>Yeni Bilgi Notu</label>
      <textarea id="modalNote" placeholder="Yeni bilgi notu yazın..."></textarea>

      <div id="notesWrap" style="margin-top:12px;"></div>
    </div>
    <div class="modalActions">
      <button class="btn" type="button" id="btnDelete">Sil</button>
      <button class="btn primary" type="button" id="btnSave">Kaydet</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="t1" id="toastT1">Bilgi</div>
  <div class="t2" id="toastT2"></div>
</div>

<script>
/* ----------------- DATA ----------------- */
let tickets = JSON.parse(localStorage.getItem("tickets") || "[]");
let users   = JSON.parse(localStorage.getItem("users")   || "{}");

function saveAll(){
  localStorage.setItem("tickets", JSON.stringify(tickets));
  localStorage.setItem("users", JSON.stringify(users));
}
function norm(v){ return String(v || "").trim(); }

function ensureCreatedAt(t){
  if(typeof t.createdAt === "number") return t.createdAt;
  const p = Date.parse(t.date || "");
  t.createdAt = Number.isFinite(p) ? p : Date.now();
  return t.createdAt;
}
function formatDate(ts){
  try{ return new Date(ts).toLocaleString(); }catch{ return ""; }
}
function generateID(){
  const n = tickets.length + 1;
  return "AKSA-IT-2026-" + String(n).padStart(4, "0");
}

/* ----------------- ELEMENTS ----------------- */
const envChip = document.getElementById("envChip");
const btnPublic = document.getElementById("btnPublic");
const btnAdmin  = document.getElementById("btnAdmin");
const publicShell = document.getElementById("publicShell");
const adminShell  = document.getElementById("adminShell");

const ticketForm = document.getElementById("ticketForm");
const fullNameInput = document.getElementById("fullNameInput");
const sicilNoInput  = document.getElementById("sicilNoInput");
const departmentSelect = document.getElementById("departmentSelect");
const prioritySelect   = document.getElementById("prioritySelect");
const issueText        = document.getElementById("issueText");
const refBox           = document.getElementById("refBox");

const trackRefInput   = document.getElementById("trackRefInput");
const trackSicilInput = document.getElementById("trackSicilInput");
const btnTrack        = document.getElementById("btnTrack");
const trackResult     = document.getElementById("trackResult");

const adminUserInput = document.getElementById("adminUserInput");
const adminPassInput = document.getElementById("adminPassInput");
const btnLogin       = document.getElementById("btnLogin");
const dashboard      = document.getElementById("dashboard");

const btnExport = document.getElementById("btnExport");
const btnClearSearch = document.getElementById("btnClearSearch");

const kAll = document.getElementById("kAll");
const kWait = document.getElementById("kWait");
const kProg = document.getElementById("kProg");
const kDone = document.getElementById("kDone");
const kAllN = document.getElementById("kAllN");
const kWaitN = document.getElementById("kWaitN");
const kProgN = document.getElementById("kProgN");
const kDoneN = document.getElementById("kDoneN");

const adminSearchInput = document.getElementById("adminSearchInput");
const statusFilter = document.getElementById("statusFilter");
const priorityFilter = document.getElementById("priorityFilter");
const adminTbody = document.getElementById("adminTbody");

/* Modal */
const modalBack = document.getElementById("modalBack");
const btnModalClose = document.getElementById("btnModalClose");
const modalTitle = document.getElementById("modalTitle");
const modalGrid  = document.getElementById("modalGrid");
const modalStatus = document.getElementById("modalStatus");
const modalPriority = document.getElementById("modalPriority");
const modalNote = document.getElementById("modalNote");
const notesWrap = document.getElementById("notesWrap");
const modalSlaBox = document.getElementById("modalSlaBox");
const btnSave = document.getElementById("btnSave");
const btnDelete = document.getElementById("btnDelete");

/* Toast */
const toast = document.getElementById("toast");
const toastT1 = document.getElementById("toastT1");
const toastT2 = document.getElementById("toastT2");

/* ----------------- STATE ----------------- */
let adminLogged = false;
let kpiFilter = "waiting";   // default waiting
let activeTicketId = null;
let modalMode = "admin";

/* ----------------- NAV ----------------- */
function showPublic(){
  envChip.textContent = "Public";
  publicShell.style.display = "block";
  adminShell.style.display  = "none";
}
function showAdmin(){
  envChip.textContent = "Admin";
  publicShell.style.display = "none";
  adminShell.style.display  = "block";
}
btnPublic.addEventListener("click", showPublic);
btnAdmin.addEventListener("click", showAdmin);

/* ----------------- TOAST ----------------- */
let toastTimer = null;
function showToast(t1, t2){
  toastT1.textContent = t1;
  toastT2.textContent = t2 || "";
  toast.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toast.style.display = "none", 2600);
}

/* ----------------- SLA ----------------- */
const SLA_WARN_H = Number(getComputedStyle(document.documentElement).getPropertyValue('--sla-warn')) || 4;
const SLA_BAD_H  = Number(getComputedStyle(document.documentElement).getPropertyValue('--sla-bad')) || 8;

function slaHours(t){
  const created = ensureCreatedAt(t);
  const ms = Date.now() - created;
  return Math.max(0, ms / 3600000);
}
function slaBoxClass(t){
  if(t.status === "done") return "";
  const h = slaHours(t);
  if(h >= SLA_BAD_H) return "slaBad";
  if(h >= SLA_WARN_H) return "slaWarn";
  return "";
}

/* ----------------- PUBLIC: CREATE ----------------- */
ticketForm.addEventListener("submit", (e)=>{
  e.preventDefault();

  const name = norm(fullNameInput.value);
  const sicil = norm(sicilNoInput.value);

  if(!name){ showToast("Eksik bilgi","Ad Soyad girin."); return; }
  if(!sicil){ showToast("Eksik bilgi","Sicil No girin."); return; }
  if(!departmentSelect.value){ showToast("Eksik bilgi","Departman seçin."); return; }

  if(users[sicil] && users[sicil] !== name){
    alert(`Bu Sicil No daha önce "${users[sicil]}" adıyla kullanılmış. Lütfen doğru Ad Soyad girin.`);
    return;
  }
  users[sicil] = name;

  const now = Date.now();
  const t = {
    id: generateID(),
    name,
    sicil,
    department: departmentSelect.value,
    priority: prioritySelect.value,
    issue: norm(issueText.value),
    status: "waiting",
    createdAt: now,
    date: formatDate(now),
    note: ""
  };

  tickets.unshift(t);
  saveAll();

  ticketForm.reset();
  refBox.style.display = "block";
  refBox.innerHTML = `<b>Talep alındı.</b> Referans: <b>${escapeHtml(t.id)}</b>`;
  showToast("Talep oluşturuldu", `${t.id} kaydedildi.`);

  if(adminLogged){
    kpiFilter = "waiting";
    statusFilter.value = "all";
    renderAdmin();
  }
});

/* ----------------- PUBLIC: TRACK ----------------- */
btnTrack.addEventListener("click", trackTicket);

// Enter basınca Sicil arama
trackSicilInput.addEventListener("keydown", (e)=>{
  if(e.key === "Enter"){
    e.preventDefault();
    trackTicket();
  }
});

function trackTicket(){
  const ref = norm(trackRefInput.value);
  const sicil = norm(trackSicilInput.value);

  if(!ref && !sicil){
    trackResult.innerHTML = `<div style="color:#64748b;font-size:12px;">Referans No veya Sicil No girin.</div>`;
    return;
  }

  if(ref){
    const t = tickets.find(x => x.id === ref);
    if(!t){ trackResult.innerHTML = `<div style="color:#64748b;font-size:12px;">Talep bulunamadı.</div>`; return; }
    trackResult.innerHTML = renderPublicTicketCard(t);
    return;
  }

  const mine = tickets.filter(x => norm(x.sicil) === sicil);
  if(mine.length === 0){
    trackResult.innerHTML = `<div style="color:#64748b;font-size:12px;">Bu sicil için talep bulunamadı.</div>`;
    return;
  }

  const nm = users[sicil] ? ` - <b>${escapeHtml(users[sicil])}</b>` : "";
  trackResult.innerHTML =
    `<div style="color:#334155;font-size:12px;margin-bottom:10px;"><b>Sicil:</b> ${escapeHtml(sicil)}${nm}</div>` +
    mine.map(renderPublicTicketCard).join("");
}

function statusLabel(st){
  if(st==="waiting") return "Bekleyen";
  if(st==="progress") return "İşlemde";
  if(st==="done") return "Tamamlandı";
  return st;
}
function priorityLabel(p){
  if(p==="low") return "Düşük";
  if(p==="medium") return "Orta";
  if(p==="high") return "Yüksek";
  return p;
}
function renderPublicTicketCard(t){
  const created = ensureCreatedAt(t);
  return `
    <div onclick="openPublicTicket('${escapeAttr(t.id)}')" style="border:1px solid #e5e7eb;background:#f8fafc;border-radius:14px;padding:12px;margin-bottom:10px;cursor:pointer;transition:.15s ease;" onmouseover="this.style.transform='translateY(-1px)'" onmouseout="this.style.transform='translateY(0)'">
      <div style="font-weight:800;color:#0f172a;">${escapeHtml(t.id)}</div>
      <div style="margin-top:6px; color:#475569; font-size:12px;">
        <b>Durum:</b> ${escapeHtml(statusLabel(t.status))} •
        <b>Öncelik:</b> ${escapeHtml(priorityLabel(t.priority))}
      </div>
      <div style="margin-top:8px; color:#0f172a;">${escapeHtml(t.issue || "-")}</div>
      <div style="margin-top:8px; color:#64748b; font-size:12px;">${escapeHtml(formatDate(created))}</div>
    </div>
  `;
}

/* KPI clicks */

    renderAdmin();

/* Toolbar events */
adminSearchInput.addEventListener("input", renderAdmin);
statusFilter.addEventListener("change", renderAdmin);
priorityFilter.addEventListener("change", renderAdmin);

btnClearSearch.addEventListener("click", ()=>{
  adminSearchInput.value = "";
  renderAdmin();
});
btnExport.addEventListener("click", exportCSV);

/* ----------------- ADMIN: RENDER ----------------- */
function renderAdmin(){
  if(!adminLogged) return;

  kAllN.textContent  = tickets.length;
  kWaitN.textContent = tickets.filter(t=>t.status==="waiting").length;
  kProgN.textContent = tickets.filter(t=>t.status==="progress").length;
  kDoneN.textContent = tickets.filter(t=>t.status==="done").length;

  [kAll,kWait,kProg,kDone].forEach(x => x.classList.toggle("active", x.dataset.filter === kpiFilter));

  const s = (adminSearchInput.value || "").toLowerCase();
  const sf = statusFilter.value;
  const pf = priorityFilter.value;

  let filtered = tickets.filter(t=>{
    ensureCreatedAt(t);
    const hay = [t.id,t.name,t.sicil,t.department,t.issue,t.status,t.priority,t.date]
      .map(x => String(x||"").toLowerCase()).join(" ");
    return hay.includes(s);
  });

  if(kpiFilter !== "all") filtered = filtered.filter(t => t.status === kpiFilter);
  if(sf !== "all") filtered = filtered.filter(t => t.status === sf);
  if(pf !== "all") filtered = filtered.filter(t => t.priority === pf);

  // SLA'ya göre bekleyenlerde eskiler üstte (yararlı)
  filtered.sort((a,b)=>{
    const ah = (a.status!=="done") ? slaHours(a) : -1;
    const bh = (b.status!=="done") ? slaHours(b) : -1;
    return bh - ah;
  });

  adminTbody.innerHTML = filtered.map(t=>{
    const created = ensureCreatedAt(t);
    const dateStr = formatDate(created);
    const issueShort = (t.issue || "-");
    const summary = issueShort.length > 90 ? issueShort.slice(0,90) + "…" : issueShort;

    // satır solunda SLA işareti (sütun yok)
    const h = slaHours(t);
    let left = "";
    if(t.status!=="done" && h>=SLA_BAD_H) left = "#ef4444";
    else if(t.status!=="done" && h>=SLA_WARN_H) left = "#f59e0b";
    const rowStyle = left ? `style="box-shadow: inset 4px 0 0 ${left};"` : "";

    return `
      <tr ${rowStyle} onclick="openTicket('${escapeAttr(t.id)}')">
        <td><b>${escapeHtml(t.id)}</b></td>
        <td>${escapeHtml(t.name)}</td>
        <td>${escapeHtml(t.sicil)}</td>
        <td>${escapeHtml(t.department)}</td>
        <td>${escapeHtml(summary)}</td>
        <td>${badgeStatus(t.status)}</td>
        <td>${badgePriority(t.priority)}</td>
        <td>${escapeHtml(dateStr)}</td>
        <td><button class="rowbtn" type="button" onclick="event.stopPropagation(); openTicket('${escapeAttr(t.id)}')">Detay</button></td>
      </tr>
    `;
  }).join("");
}

/* ----------------- MODAL ----------------- */
function renderNotesList(t, isPublic){
  const notes = Array.isArray(t.notes) ? t.notes : [];
  if(notes.length === 0){
    return `<div style="padding:12px;border:1px dashed var(--a-line);border-radius:14px;color:${isPublic ? '#64748b' : 'var(--a-muted)'};font-size:12px;">Henüz bilgi notu yok.</div>`;
  }
  return `
    <div style="display:flex;flex-direction:column;gap:10px;">
      ${notes.map(n => `
        <div style="padding:12px;border:1px solid var(--a-line);border-radius:14px;background:${isPublic ? '#f8fafc' : 'rgba(0,0,0,.18)'};color:${isPublic ? '#0f172a' : 'var(--a-text)'};">
          <div style="font-size:12px;color:${isPublic ? '#64748b' : 'var(--a-muted)'};margin-bottom:6px;">${escapeHtml(n.date || '')}</div>
          <div style="white-space:pre-wrap;">${escapeHtml(n.text || '')}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function openTicket(id, mode = "admin"){
  const t = tickets.find(x => x.id === id);
  if(!t) return;

  activeTicketId = id;
  modalMode = mode;
  const created = ensureCreatedAt(t);
  const isPublic = mode === "public";

  modalTitle.textContent = isPublic ? `${t.id} Detayı` : t.id;

  const h = slaHours(t);
  modalSlaBox.className = "slaBox " + slaBoxClass(t);
  modalSlaBox.textContent = `${h.toFixed(1)} saat`;

  modalGrid.innerHTML = `
    ${kv("Talep Açan", escapeHtml(t.name))}
    ${kv("Sicil No", escapeHtml(t.sicil))}
    ${kv("Departman", escapeHtml(t.department))}
    ${kv("Tarih", escapeHtml(formatDate(created)))}
    ${kv("Durum", badgeStatus(t.status))}
    ${kv("Öncelik", badgePriority(t.priority))}
    <div class="kv" style="grid-column:1/-1;">
      <div class="k">Sorun Açıklaması</div>
      <div class="v" style="font-weight:700;">${escapeHtml(t.issue || "-")}</div>
    </div>
  `;

  modalStatus.value = t.status;
  modalPriority.value = t.priority;
  modalNote.value = "";
  notesWrap.innerHTML = `
    <label style="display:block;margin-bottom:8px;color:${isPublic ? '#475569' : 'var(--a-muted)'};">Bilgi Notları</label>
    ${renderNotesList(t, isPublic)}
  `;

  modalStatus.disabled = isPublic;
  modalPriority.disabled = isPublic;
  modalNote.style.display = isPublic ? "none" : "block";
  notesWrap.style.display = "block";
  document.querySelector('label[for="__dummy__"]');

  const noteLabel = modalNote.previousElementSibling;
  if(noteLabel) noteLabel.style.display = isPublic ? "none" : "block";
  btnSave.style.display = isPublic ? "none" : "inline-flex";
  btnDelete.style.display = isPublic ? "none" : "inline-flex";

  modalBack.style.display = "flex";
}

function openPublicTicket(id){
  openTicket(id, "public");
}

function closeModal(){
  modalBack.style.display = "none";
  activeTicketId = null;
}
btnModalClose.addEventListener("click", closeModal);
modalBack.addEventListener("click", (e)=>{ if(e.target === modalBack) closeModal(); });

btnSave.addEventListener("click", ()=>{
  if(!activeTicketId) return;
  const t = tickets.find(x => x.id === activeTicketId);
  if(!t) return;

  t.status = modalStatus.value;
  t.priority = modalPriority.value;

  const newNote = norm(modalNote.value);
  if(!Array.isArray(t.notes)) t.notes = [];
  if(newNote){
    t.notes.unshift({ text: newNote, date: formatDate(Date.now()) });
  }
  t.note = t.notes.map(n => `[${n.date}] ${n.text}`).join("\n");

  saveAll();
  modalNote.value = "";
  notesWrap.innerHTML = `
    <label style="display:block;margin-bottom:8px;color:var(--a-muted);">Bilgi Notları</label>
    ${renderNotesList(t, false)}
  `;
  showToast("Kaydedildi", newNote ? `${t.id} güncellendi ve bilgi notu eklendi.` : `${t.id} güncellendi.`);
  renderAdmin();
});

btnDelete.addEventListener("click", ()=>{
  if(!activeTicketId) return;
  const t = tickets.find(x => x.id === activeTicketId);
  if(!t) return;

  if(!confirm(`${t.id} silinsin mi?`)) return;

  tickets = tickets.filter(x => x.id !== activeTicketId);
  saveAll();
  showToast("Silindi", `${t.id} kaldırıldı.`);
  renderAdmin();
  closeModal();
});

/* ----------------- BADGES ----------------- */
function badgeStatus(st){
  if(st==="waiting") return `<span class="badge b-wait">Bekleyen</span>`;
  if(st==="progress") return `<span class="badge b-prog">İşlemde</span>`;
  if(st==="done") return `<span class="badge b-done">Tamamlandı</span>`;
  return `<span class="badge">${escapeHtml(st)}</span>`;
}
function badgePriority(p){
  if(p==="low") return `<span class="badge p-low">Düşük</span>`;
  if(p==="medium") return `<span class="badge p-med">Orta</span>`;
  if(p==="high") return `<span class="badge p-high">Yüksek</span>`;
  return `<span class="badge">${escapeHtml(p)}</span>`;
}
function kv(k, v){
  return `<div class="kv"><div class="k">${k}</div><div class="v">${v}</div></div>`;
}

/* ----------------- CSV EXPORT ----------------- */
function csvSafe(v){
  const s = String(v ?? "").replaceAll('"','""');
  return `"${s}"`;
}
function exportCSV(){
  const header = `"Referans","Ad Soyad","Sicil No","Departman","Öncelik","Durum","SLA Saat","Tarih","Sorun","IT Notu"\n`;
  const rows = tickets.map(t => {
    const created = ensureCreatedAt(t);
    const sla = slaHours(t).toFixed(2);
    return [
      t.id, t.name, t.sicil, t.department, t.priority, t.status, sla, formatDate(created), t.issue, t.note
    ].map(csvSafe).join(",");
  }).join("\n");
  const blob = new Blob([header + rows], {type:"text/csv;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "aksa_it_tickets_v2_3.csv";
  a.click();
  showToast("CSV hazır","Dosya indirildi.");
}

/* ----------------- ESCAPE ----------------- */
function escapeHtml(str){
  return String(str ?? "")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}
function escapeAttr(str){
  return String(str ?? "").replaceAll("'", "\\'");
}

/* ----------------- INIT + MIGRATE ----------------- */
showPublic();

// eski kayıtlar için createdAt yoksa ekle
(function migrate(){
  let changed = false;
  for(const t of tickets){
    if(typeof t.createdAt !== "number"){
      ensureCreatedAt(t);
      t.date = t.date || formatDate(t.createdAt);
      changed = true;
    }
    if(!Array.isArray(t.notes)){
      if(norm(t.note)){
        t.notes = [{ text: norm(t.note), date: t.date || formatDate(t.createdAt) }];
      }else{
        t.notes = [];
      }
      changed = true;
    }
    // eski sürümde kalan category varsa bile dursun (kullanılmıyor)
  }
  if(changed) saveAll();
})();
